# Supabase project config — local-first, mirrored to a managed project for prod.
# `supabase start` brings up the local stack (Postgres + Auth + Storage + Realtime + Studio).
# Reference: https://supabase.com/docs/guides/cli/local-development

project_id = "court-interpreter-scheduling"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://localhost:8080",        # bcgov Vue dev
  "http://localhost:8085",        # easyappointments
  "http://localhost:8088",        # metabase
]
jwt_expiry = 3600
enable_signup = false              # users provisioned by court admins, not self-signup

[auth.email]
enable_confirmations = true
double_confirm_changes = true
secure_password_change = true

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.external.azure]
enabled = false                    # flip true for JCC SAML SSO via Azure AD / Entra
client_id = "env(AZURE_CLIENT_ID)"
secret = "env(AZURE_CLIENT_SECRET)"
url = "env(AZURE_TENANT_URL)"

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.interpreter-certifications]
public = false
file_size_limit = "20MiB"
allowed_mime_types = ["application/pdf", "image/png", "image/jpeg"]

[storage.buckets.adm-forms]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf"]

[edge_runtime]
enabled = true
inspector_port = 8083

[functions]
verify_jwt = true

[analytics]
enabled = true
port = 54327
