services:
  php-fpm:
    build: docker/php-fpm
    working_dir: /var/www/html
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - '.:/var/www/html'
      - './docker/php-fpm/php-ini-overrides.ini:/usr/local/etc/php/conf.d/99-overrides.ini'
    environment:
      - DB_DRIVER=postgre
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=easyappointments
      - DB_USERNAME=easyappointments
      - DB_PASSWORD=easyappointments
    depends_on:
      - postgres

  nginx:
    image: 'nginx:1.23.3-alpine'
    working_dir: /var/www/html
    volumes:
      - '.:/var/www/html'
      - './docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf'
    ports:
      - '80:80'

  # PostgreSQL replaces MySQL — EA reads `Config::DB_DRIVER` (defaults to
  # `postgre`) and connects via `Config::DB_HOST` etc. In production this
  # service is replaced by Supabase Cloud or a managed Postgres; locally we
  # run the official postgres image so a fresh `docker compose up` boots EA
  # against an empty Postgres instance and the CI migrations create the
  # schema via dialect-aware helpers in EA_Migration.
  postgres:
    image: 'postgres:16-alpine'
    volumes:
      - './docker/postgres:/var/lib/postgresql/data'
      - './docker/postgres-init:/docker-entrypoint-initdb.d:ro'
    environment:
      - POSTGRES_DB=easyappointments
      - POSTGRES_USER=easyappointments
      - POSTGRES_PASSWORD=easyappointments
    ports:
      - '5432:5432'

  mailpit:
    image: 'axllent/mailpit:v1.7'
    ports:
      - '8025:8025'
      - '1025:1025'

  swagger-ui:
    platform: linux/amd64
    image: swaggerapi/swagger-ui:v5.10.5
    ports:
      - "8000:8080"
    volumes:
      - ./openapi.yml:/usr/share/nginx/html/openapi.yml
    environment:
      API_URL: openapi.yml
  
  baikal:
    image: ckulka/baikal:0.10.1-apache
    ports:
      - "8100:80"
    volumes:
      - ./docker/baikal:/var/www/html
      - ./docker/baikal/config:/var/www/baikal/config
      - ./docker/baikal/data:/var/www/baikal/Specific
  
  openldap:
    image: osixia/openldap:1.5.0
    hostname: openldap
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ./docker/openldap/certificates:/container/service/slapd/assets/certs
      - ./docker/openldap/slapd/database:/var/lib/ldap
      - ./docker/openldap/slapd/config:/etc/ldap/slapd.d
    environment:
      - LDAP_ORGANISATION=example
      - LDAP_DOMAIN=example.org
      - LDAP_ADMIN_USERNAME=admin
      - LDAP_ADMIN_PASSWORD=admin
      - LDAP_CONFIG_PASSWORD=config_pass
      - "LDAP_BASE_DN=dc=example,dc=org"
      - LDAP_READONLY_USER=true
      - LDAP_READONLY_USER_USERNAME=user
      - LDAP_READONLY_USER_PASSWORD=password

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    hostname: phpldapadmin
    ports:
      - "8200:80"
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false
    depends_on:
      - openldap

