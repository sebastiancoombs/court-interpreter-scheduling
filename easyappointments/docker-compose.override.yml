# Combined-stack override:
# - Remap ports so EA runs alongside bcgov dev (8080) and the mock-api (8082).
# - Add Metabase as the §5 analytics layer, on the same docker network as EA's Postgres.

services:
  nginx:
    ports:
      - '8085:80'

  swagger-ui:
    ports:
      - '8087:8080'

  metabase:
    image: metabase/metabase:v0.50.30
    container_name: cis-metabase
    ports:
      - '8088:3000'
    environment:
      # Metabase's own metadata DB lives in the same Postgres instance as
      # EA — one DB connection for the whole stack. Schema isolation via
      # the metabase user owning its own schema.
      - MB_DB_TYPE=postgres
      - MB_DB_HOST=postgres
      - MB_DB_PORT=5432
      - MB_DB_DBNAME=metabase
      - MB_DB_USER=metabase
      - MB_DB_PASS=metabase
      - JAVA_TIMEZONE=America/Los_Angeles
    depends_on:
      - postgres
