# Unified nginx config for the single-container Railway service.
# Path-based routing into the right local backend; everything else falls
# through to the Vue static build. Render at startup via `envsubst` so
# Railway's $PORT and any host overrides resolve.

user www-data;
worker_processes auto;
pid /run/nginx/nginx.pid;
# Log to stderr so Railway/supervisord capture errors directly. The
# error stream surfaces upstream/fastcgi failures (502 root causes).
error_log /dev/stderr warn;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  client_max_body_size 32m;
  access_log /dev/stdout;

  upstream bcgov_api    { server 127.0.0.1:8001; }
  upstream auth_bridge  { server 127.0.0.1:8090; }
  upstream metabase_sso { server 127.0.0.1:8091; }
  upstream ea_php       { server unix:/run/php/php8.2-fpm.sock; }

  server {
    listen ${PORT} default_server;
    server_name _;

    root /var/www/html/web;
    index index.html;

    # Health check for Railway
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # bcgov FastAPI — admin/reporting backend. No trailing slash on
    # proxy_pass: FastAPI's routes are mounted under /api/v1/*, so we
    # forward the path verbatim instead of stripping the /api/ prefix.
    location /api/ {
      proxy_pass http://bcgov_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # auth-bridge — JWT verification + topbar.css source
    location /auth/ {
      proxy_pass http://auth_bridge/;
      proxy_set_header Host $host;
    }

    # metabase-sso — proxied Metabase wrapped in unified topbar
    location /reports {
      return 302 /reports/metabase/;
    }
    location /reports/ {
      proxy_pass http://metabase_sso/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Easy!Appointments — booking calendar + admin. EA uses CodeIgniter
    # routing where /calendar is internally /index.php/calendar; rewrite
    # to that form and let the .php location match on re-evaluation.
    location ~ ^/(calendar|booking|providers|customers|services|service_categories|admins|secretaries|general_settings|booking_settings|business_settings|legal_settings|integration_settings|sso|login)(/.*)?$ {
      rewrite ^(.*)$ /index.php$1 last;
    }
    location ~ ^/(.+\.php)(/.*)?$ {
      root /var/www/html/ea;
      fastcgi_split_path_info ^(.+\.php)(/.*)$;
      fastcgi_pass ea_php;
      fastcgi_index index.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_param PATH_INFO       $fastcgi_path_info;
    }

    # bcgov Vue SPA fallback — every other path serves the SPA shell.
    # Vue Router resolves it client-side.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
