# nginx config for the cis-unified SPA + API proxy.
# The resolver line uses __RESOLVER__ as a placeholder. The Dockerfile CMD
# reads the actual nameserver from /etc/resolv.conf at startup and does a
# targeted sed substitution — avoids envsubst, which clobbers nginx's own
# $-variables ($uri, $host, etc.). Railway containers expose the cluster
# DNS at the address listed in /etc/resolv.conf; 8.8.8.8 cannot resolve
# *.railway.internal hostnames.
resolver __RESOLVER__ valid=30s;

server {
    # IPv4 + IPv6 — Railway's private service-to-service mesh resolves
    # `*.railway.internal` over IPv6, so internal calls (e.g. bcgov-api
    # fetching the OIDC stub) need the IPv6 socket open.
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Stub OIDC discovery document — bcgov-api fetches a Keycloak-style
    # `.well-known/openid-configuration` at startup and crashes if the
    # response isn't a valid OIDC JSON. We never actually use Keycloak
    # SSO; authentication flows through Supabase. Serving a static stub
    # lets bcgov-api boot without touching its source.
    location ~ ^/auth/realms/[^/]+/\.well-known/openid-configuration$ {
        default_type application/json;
        add_header Cache-Control "no-store";
        return 200 '{"issuer":"https://stub.invalid","authorization_endpoint":"https://stub.invalid/auth","token_endpoint":"https://stub.invalid/token","userinfo_endpoint":"https://stub.invalid/userinfo","end_session_endpoint":"https://stub.invalid/logout","jwks_uri":"https://stub.invalid/certs","response_types_supported":["code"],"subject_types_supported":["public"],"id_token_signing_alg_values_supported":["RS256"]}';
    }

    # Health check — Railway's internal mesh probes this; return 200 so the
    # service isn't flagged unhealthy when hashed JS filenames change.
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Reverse-proxy `/api/*` to the bcgov FastAPI service. Same-domain
    # routing eliminates the cross-origin pre-flight on every booking
    # call — the browser sees one host (this nginx) for both UI and API.
    # `set` + variable allows the resolver line above to evaluate
    # bcgov-api.railway.internal at request time instead of nginx start.
    location /api/ {
        set $cis_api "bcgov-api.railway.internal:8080";
        proxy_pass http://$cis_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # SPA fallback — every unknown path serves the Vue Router's index.html
    # so client-side routing takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for the hashed asset bundles vue-cli emits.
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|svg|gif|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
