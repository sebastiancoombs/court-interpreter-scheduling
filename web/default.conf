# Static nginx config — no template substitution, listens on the
# fixed port 80 that Railway auto-detects. Drops the envsubst path
# because nginx-alpine's default entrypoint substitution can corrupt
# nginx's native $-variables, leading to silent startup failures.
server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — every unknown path serves the Vue Router's index.html
    # so client-side routing takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for the hashed asset bundles vue-cli emits.
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|svg|gif|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
